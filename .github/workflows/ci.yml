name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Test API
        run: dotnet test TaskApi.Tests/TaskApi.Tests.csproj --configuration Release --verbosity normal

      - name: Test MAUI client
        run: dotnet test TaskApp.Tests/TaskApp.Tests.csproj --configuration Release --verbosity normal